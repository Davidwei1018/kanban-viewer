<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Kanban Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .kanban-column { min-height: 200px; }
        .card { transition: transform 0.1s ease-in-out; }
        .card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div class="max-w-7xl mx-auto p-4">
        <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                    Hermes Kanban
                </h1>
                <button onclick="fetchKanbanData()" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-2 py-1 rounded border border-slate-600 transition-colors">
                    ↻ Reload
                </button>
            </div>
            <div id="last-updated" class="text-xs text-slate-400 italic">
                Loading...
            </div>
        </header>

        <div id="error-banner" class="hidden mb-4 p-3 bg-red-900/50 border border-red-500 text-red-200 text-sm rounded-lg"></div>

        <div id="kanban-board" class="flex flex-row overflow-x-auto gap-4 pb-4 items-start">
            <div class="w-full text-center py-20 text-slate-500 animate-pulse">Initializing board...</div>
        </div>
    </div>

    <script>
        const DATA_URL = 'kanban_data.json';
        const REFRESH_INTERVAL = 300000; // 5 minutes

        async function fetchKanbanData() {
            const banner = document.getElementById('error-banner');
            const board = document.getElementById('kanban-board');
            const lastUpdated = document.getElementById('last-updated');
            
            banner.classList.add('hidden');
            lastUpdated.innerText = 'Fetching...';

            try {
                const response = await fetch(DATA_URL + '?t=' + new Date().getTime());
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                
                if (!Array.isArray(data)) throw new Error('Data is not an array');

                renderBoard(data);
                lastUpdated.innerText = 'Last updated: ' + new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Error:', error);
                banner.innerText = `Error: ${error.message}`;
                banner.classList.remove('hidden');
                lastUpdated.innerText = 'Update failed';
                
                if (board.innerHTML.includes('Initializing board...')) {
                    board.innerHTML = `
                        <div class="w-full text-center py-20 text-red-400">
                            <p class="text-lg font-bold">Failed to load data</p>
                            <p class="text-sm opacity-70">${error.message}</p>
                            <p class="text-xs mt-4 text-slate-500">Check your internet or the error banner above.</p>
                        </div>
                    `;
                }
            }
        }

        function renderBoard(tasks) {
            const board = document.getElementById('kanban-board');
            board.innerHTML = '';

            // 1. Group tasks by status
            const columns = {};
            tasks.forEach(task => {
                const status = task.status || 'unknown';
                if (!columns[status]) columns[status] = [];
                columns[status].push(task);
            });

            // 2. Sort statuses (optional: define a specific order)
            const sortedStatuses = Object.keys(columns).sort((a, b) => {
                const order = { 'ready': 1, 'in_progress': 2, 'completed': 3 };
                return (order[a] || 99) - (order[b] || 99);
            });

            if (sortedStatuses.length === 0) {
                board.innerHTML = '<div class="w-full text-center py-20 text-slate-500 italic">No tasks found.</div>';
                return;
            }

            // 3. Create columns
            sortedStatuses.forEach(status => {
                const colDiv = document.createElement('div');
                colDiv.className = 'flex-shrink-0 w-72 bg-slate-800/50 rounded-lg p-3 flex flex-col border border-slate-700/50';
                
                const titleDiv = document.createElement('div');
                titleDiv.className = 'flex items-center justify-between mb-3 px-1';
                
                const title = document.createElement('h2');
                title.className = 'text-sm font-semibold uppercase tracking-wider text-slate-400';
                title.innerText = status;
                
                const taskCount = document.createElement('span');
                taskCount.className = 'text-xs bg-slate-700 text-slate-300 px-2 py-0.5 rounded-full';
                taskCount.innerText = columns[status].length;
                
                titleDiv.appendChild(title);
                titleDiv.appendChild(taskCount);
                colDiv.appendChild(titleDiv);

                const taskList = document.createElement('div');
                taskList.className = 'kanban-column space-y-3';

                columns[status].forEach(task => {
                    const card = document.createElement('div');
                    card.className = 'card bg-slate-800 border border-slate-700 p-4 rounded-md shadow-lg hover:border-blue-500/50 cursor-pointer';
                    
                    // Priority colors
                    const priorityColors = { 0: 'bg-slate-600', 1: 'bg-blue-600', 2: 'bg-orange-600', 3: 'bg-red-600' };
                    const pColor = priorityColors[task.priority] || 'bg-slate-600';

                    card.innerHTML = `
                        <div class="flex items-start justify-between mb-2">
                            <div class="w-2 h-2 rounded-full ${pColor} mt-1.5"></div>
                            <div class="text-[10px] text-slate-500 uppercase font-bold">${task.assignee || 'unassigned'}</div>
                        </div>
                        <h3 class="text-sm font-medium text-slate-100 leading-tight mb-2">${task.title}</h3>
                        ${task.body ? `<p class="text-xs text-slate-400 line-clamp-3">${task.body}</p>` : ''}
                        <div class="mt-3 pt-2 border-t border-slate-700/50 flex justify-end text-[10px] text-slate-500">
                            ${new Date(task.created_at * 1000).toLocaleDateString()}
                        </div>
                    `;
                    
                    // Card click for full view (optional)
                    card.onclick = () => alert(`Task: ${task.title}\n\n${task.body || 'No description'}`);

                    taskList.appendChild(card);
                });

                colDiv.appendChild(taskList);
                board.appendChild(colDiv);
            });


        // Initial load
        fetchKanbanData();

        // Polling
        setInterval(fetchKanbanData, REFRESH_INTERVAL);
    </script>
</body>
</html>
